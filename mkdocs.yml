site_name: pyionoseis
site_description: A python package for modeling and anlaysis of coseismic ionospheric disturbances
site_author: dylanmikesell
site_url: https://dylanmikesell.github.io/pyionoseis
repo_url: https://github.com/dylanmikesell/pyionoseis

copyright: "Copyright &copy; 2024 - 2025 Dylan Mikesell"

theme:
    palette:
        - scheme: default
          #   primary: blue
          #   accent: indigo
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - scheme: slate
          primary: indigo
          accent: indigo
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
    name: material
    icon:
        repo: fontawesome/brands/github
    # logo: assets/logo.png
    # favicon: assets/favicon.png
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.top
        - search.highlight
        - search.share
    custom_dir: "docs/overrides"
    font:
        text: Google Sans
        code: Regular

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - git-revision-date-localized:
          enable_creation_date: true
          type: timeago
    # - pdf-export
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
          execute: True
          allow_errors: false
          ignore: ["conf.py"]
          execute_ignore: ["*ignore.ipynb"]
          
markdown_extensions:
    - admonition
    - abbr
    - attr_list
    - def_list
    - footnotes
    - meta
    - md_in_html
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.highlight:
          linenums: true
    - toc:
          permalink: true

extra_javascript:
    - javascripts/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
    - https://unpkg.com/mermaid@10/dist/mermaid.min.js
    - javascripts/mermaid.js

# extra:
#     analytics:
#         provider: google
#         property: UA-XXXXXXXXX-X

nav:
    - Home: index.md
    - Installation: installation.md
    - Usage: usage.md
    - Contributing: contributing.md
    - FAQ: faq.md
    - Changelog: changelog.md
    - Model: model.md
    - Continuity: continuity.md
    - Line-of-Sight TEC: tec.md
    - Wavevector Mapping: wavevector.md
    - Wasp3D Wave Vector: wasp3d-wavevector.md
    - Report Issues: https://github.com/dylanmikesell/pyionoseis/issues
    - Examples:
        - examples/intro.ipynb
    - API Reference:
          - pyionoseis module: pyionoseis.md
          - common module: common.md
        #   - model module: model.md
